<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Stream Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 960px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .live-badge {
            background: #e63946;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 4px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #fff;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        .status-bar {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }

        .status-dot.ok {
            background: #2ecc71;
        }

        .status-dot.error {
            background: #e63946;
        }

        .status-dot.loading {
            background: #f39c12;
            animation: pulse 1s infinite;
        }

        #status-text {
            color: #aaa;
        }

        .stream-url {
            margin-top: 8px;
            font-size: 11px;
            color: #444;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
            </div>
            <div class="title">ScoreTV Stream Test</div>
        </div>

        <div class="player-wrapper">
            <video id="video" controls autoplay muted playsinline></video>
        </div>

        <div class="status-bar">
            <div class="status-dot loading" id="status-dot"></div>
            <span id="status-text">Stream холбож байна...</span>
        </div>
        <div class="stream-url">https://hls.scoretv.online/hls/strstreamm.m3u8</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const dot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const streamUrl = 'https://hls.scoretv.online/hls/strstreamm.m3u8';

        function setStatus(type, msg) {
            dot.className = 'status-dot ' + type;
            statusText.textContent = msg;
        }

        if (Hls.isSupported()) {
            const hls = new Hls({
                liveSyncDurationCount: 3,
                liveMaxLatencyDurationCount: 6,
            });

            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                setStatus('ok', 'Stream амжилттай холбогдлоо ✓');
                video.play().catch(() => {
                    setStatus('ok', 'Stream бэлэн — Play дарна уу ▶');
                });
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    setStatus('error', 'Алдаа: ' + data.type + ' — ' + data.details);
                    console.error('HLS fatal error:', data);
                }
            });

            hls.on(Hls.Events.FRAG_LOADED, () => {
                setStatus('ok', 'Stream тоглож байна ✓');
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari native HLS
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', () => {
                setStatus('ok', 'Safari — Stream бэлэн ✓');
                video.play();
            });
            video.addEventListener('error', () => {
                setStatus('error', 'Safari: Stream ачааллахад алдаа гарлаа');
            });
        } else {
            setStatus('error', 'Таны browser HLS дэмждэггүй байна.');
        }
    </script>
</body>

</html>
